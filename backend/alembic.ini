[alembic]
# Path to migration scripts (relative to /app inside the container).
script_location = alembic

# Filename template for new revisions.
# Produces files like: 20260430_1430_a1b2c3d4_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .
version_path_separator = os
timezone = UTC

# sqlalchemy.url is set at runtime in env.py from app.config.settings,
# so credentials never live in this file.
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
